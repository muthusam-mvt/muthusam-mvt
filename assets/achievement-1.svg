<svg xmlns="http://www.w3.org/2000/svg" width="260" height="130" viewBox="0 0 260 130" fill="none">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .card-container {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 1.4s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
      }
      .card-container:hover {
        transform: translateY(-3px);
        filter: drop-shadow(0 4px 8px rgba(200, 211, 197, 0.12));
      }
      .card-container:hover .card {
        stroke: #C8D3C5;
      }
      .card {
        fill: #19201C;
        stroke: #222A26;
        stroke-width: 1.5;
        rx: 10px;
        transition: stroke 0.3s;
      }
    </style>
  </defs>

  <g class="card-container">
    <!-- Background with Sage Accent Border on Hover -->
    <rect width="260" height="130" class="card" />

    <!-- Trophy Icon (Vector) using Champagne Gold -->
    <g transform="translate(20, 20)">
      <path d="M4 2 H16 V6 C16 9.3 13.3 12 10 12 H10 C6.7 12 4 9.3 4 6 Z" stroke="#D4C4AE" stroke-width="1.5" fill="none"/>
      <path d="M10 12 V16 M7 16 H13" stroke="#D4C4AE" stroke-width="1.5" />
    </g>

    <!-- Year in Top Right (Sage Green) -->
    <text x="240" y="32" text-anchor="end" fill="#C8D3C5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" letter-spacing="1">
      2026
    </text>

    <!-- Result Line 1 -->
    <text x="20" y="76" fill="#F4F3EF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="700" letter-spacing="-0.3px">
      🥈 2nd Place — CodeCraft
    </text>

    <!-- Result Line 2 -->
    <text x="20" y="98" fill="#A0ADA4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="500">
      🏁 Finalist — Technova
    </text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="110" height="32" viewBox="0 0 110 32">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .btn-group {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.24s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
        cursor: pointer;
      }
      .btn-group:hover {
        transform: translateY(-2px);
        filter: drop-shadow(0 4px 6px rgba(56, 189, 248, 0.25));
      }
      .btn-group:hover .bg { stroke: #38BDF8; }
      .bg { fill: #080B10; stroke: #1E293B; stroke-width: 1.5; rx: 6px; transition: stroke 0.3s; }
      .text { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; }
      .icon { fill: #38BDF8; }
    </style>
  </defs>
  <g class="btn-group">
    <rect width="108" height="30" x="1" y="1" class="bg"/>
    <!-- Email Icon -->
    <path class="icon" d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" transform="translate(8, 4) scale(0.9)"/>
    <text x="36" y="20" class="text">Email</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="145" height="32" viewBox="0 0 145 32">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .btn-group {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.26s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
        cursor: pointer;
      }
      .btn-group:hover {
        transform: translateY(-2px);
        filter: drop-shadow(0 4px 6px rgba(99, 102, 241, 0.25));
      }
      .btn-group:hover .bg { stroke: #6366F1; }
      .bg { fill: #080B10; stroke: #1E293B; stroke-width: 1.5; rx: 6px; transition: stroke 0.3s; }
      .text { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; }
      .icon { fill: #6366F1; stroke: #6366F1; stroke-width: 1.5; fill-rule: evenodd; }
    </style>
  </defs>
  <g class="btn-group">
    <rect width="143" height="30" x="1" y="1" class="bg"/>
    <!-- AbhiyantriX Icon -->
    <path class="icon" d="M4 18 L10 6 L16 18 M6 14 L14 14 M12 6 L18 18 M18 6 L12 18" transform="translate(6, 4) scale(0.9)"/>
    <text x="38" y="20" class="text">AbhiyantriX</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="120" height="32" viewBox="0 0 120 32">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .btn-group {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.28s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
        cursor: pointer;
      }
      .btn-group:hover {
        transform: translateY(-2px);
        filter: drop-shadow(0 4px 6px rgba(212, 196, 174, 0.15));
      }
      .btn-group:hover .bg { stroke: #D4C4AE; }
      .bg { fill: #19201C; stroke: #222A26; stroke-width: 1.5; rx: 6px; transition: stroke 0.3s; }
      .text { fill: #F4F3EF; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; }
      .icon { fill: #F4F3EF; }
    </style>
  </defs>
  <g class="btn-group">
    <rect width="118" height="30" x="1" y="1" class="bg"/>

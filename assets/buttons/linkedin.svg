<svg xmlns="http://www.w3.org/2000/svg" width="130" height="32" viewBox="0 0 130 32">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .btn-group {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.2s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s, stroke 0.3s;
        cursor: pointer;
      }
      .btn-group:hover {
        transform: translateY(-2px);
        filter: drop-shadow(0 4px 6px rgba(99, 102, 241, 0.25));
      }
      .btn-group:hover .bg { stroke: #6366F1; }
      .bg { fill: #080B10; stroke: #1E293B; stroke-width: 1.5; rx: 6px; transition: stroke 0.3s; }
      .text { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; }
      .icon { fill: #6366F1; }
    </style>
  </defs>
  <g class="btn-group">
    <rect width="128" height="30" x="1" y="1" class="bg"/>
    <!-- LinkedIn Icon -->
    <path class="icon" d="M12 9H9.5V17H12V9.5C12 8.5 12.5 8 13.5 8C14.5 8 15 8.5 15 9.5V17H17.5V9.5C17.5 7.5 16.5 6.5 14.5 6.5C13.5 6.5 12.5 7 12 7.8V6.5H9.5V17H12V9ZM6 6.5C5.2 6.5 4.5 7.2 4.5 8C4.5 8.8 5.2 9.5 6 9.5C6.8 9.5 7.5 8.8 7.5 8C7.5 7.2 6.8 6.5 6 6.5ZM4.8 17H7.2V10.5H4.8V17Z" transform="translate(8, 0) scale(1.2)"/>
    <text x="38" y="20" class="text">LinkedIn</text>
  </g>
</svg>

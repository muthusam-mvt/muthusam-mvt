    2026
  </text>

  <!-- Result Line 1 -->
  <text x="20" y="76" fill="#F4F6F8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="700" letter-spacing="-0.3px">

<svg xmlns="http://www.w3.org/2000/svg" width="260" height="130" viewBox="0 0 260 130" fill="none">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .card-container {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 1.8s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
      }
      .card-container:hover {
        transform: translateY(-3px);
        filter: drop-shadow(0 4px 8px rgba(200, 211, 197, 0.15));
      }
    </style>
  </defs>

  <g class="card-container">
    <!-- Background with Sage Accent Border -->
    <rect width="260" height="130" rx="10" fill="#121614" stroke="#C8D3C5" stroke-width="1.5" />

    <!-- Code/Terminal Icon (Vector) -->
    <g transform="translate(20, 20)">
      <path d="M5 4 L1 8 L5 12" stroke="#D4C4AE" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M13 4 L17 8 L13 12" stroke="#D4C4AE" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Year in Top Right -->
    <text x="240" y="32" text-anchor="end" fill="#D4C4AE" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" letter-spacing="1">
      2026
    </text>

    <!-- Result Line 1 -->
    <text x="20" y="76" fill="#F4F3EF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="700" letter-spacing="-0.3px">
      ⚡ Pragati 2.0 Build-It On
    </text>

    <!-- Result Line 2 -->
    <text x="20" y="98" fill="#F4F3EF" fill-opacity="0.7" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="500">
      🎯 Saavishkar 2026 Participant
    </text>
  </g>
</svg>

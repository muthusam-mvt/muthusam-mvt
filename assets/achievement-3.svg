  <rect width="260" height="130" rx="10" fill="#090D16" stroke="#F4F6F8" stroke-width="1.5" />

  <!-- Code/Terminal Icon (Vector) -->
  <g transform="translate(20, 20)">
    <path d="M5 4 L1 8 L5 12" stroke="#F4F6F8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M13 4 L17 8 L13 12" stroke="#F4F6F8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Year in Top Right -->

<svg xmlns="http://www.w3.org/2000/svg" width="830" height="320" viewBox="0 0 830 320" fill="none">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#131C30" stroke-width="1"/>
    </pattern>

    <!-- Clip Path for typing animation -->
    <clipPath id="clip-tagline">
      <rect id="mask-rect" x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="580" dur="4s" begin="0.5s" fill="freeze" keyTimes="0;1" keySplines="0.4 0 0.2 1" calcMode="spline" />
      </rect>
    </clipPath>
  </defs>

  <!-- Dark Obsidian Background -->
  <rect width="830" height="320" rx="16" fill="#090D16"/>
  <!-- Grid overlay -->
  <rect width="830" height="320" rx="16" fill="url(#grid)"/>

  <!-- Sleek Border using Primary Accent (Electric Slate Blue) -->
  <rect x="0.75" y="0.75" width="828.5" height="318.5" rx="15.25" stroke="#2A64F6" stroke-width="1.5" style="mix-blend-mode: screen; opacity: 0.85;"/>

  <!-- Left Accent Vertical Bar (Electric Slate Blue / Sky Blue Gradient) -->
  <rect x="35" y="45" width="3" height="230" rx="1.5" fill="#2A64F6" />

  <!-- Content Group -->
  <g transform="translate(60, 0)">
    <!-- Top Status Pill (Sky Blue Accent) -->
    <g transform="translate(0, 48)">
      <rect width="138" height="22" rx="11" fill="#090D16" stroke="#38BDF8" stroke-width="1" />
      <circle cx="12" cy="11" r="3.5" fill="#38BDF8">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="24" y="15" fill="#F4F6F8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="700" letter-spacing="1.5">CREATIVE BUILDER</text>
    </g>

    <!-- Title (Warm White) -->
    <text x="0" y="112" fill="#F4F6F8" font-family="-apple-system, BlinkMacSystemFont, 'Outfit', 'Segoe UI', sans-serif" font-size="36" font-weight="800" letter-spacing="-0.5px">
      MUTHUSAM THEVAR
    </text>

    <!-- Subtitle (Editorial Style with '//' dividers) -->
    <text x="0" y="148" fill="#38BDF8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" letter-spacing="1">
      COMPUTER ENGINEERING STUDENT <tspan fill="#2A64F6">//</tspan> FULL-STACK DEVELOPER <tspan fill="#2A64F6">//</tspan> UI/UX DESIGNER
    </text>

    <!-- Tagline (With typing animation) -->
    <g transform="translate(0, 185)">
      <g clip-path="url(#clip-tagline)">
        <text x="0" y="20" fill="#F4F6F8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="400" letter-spacing="0.5">
          Building products that solve real problems through design and code.
        </text>
      </g>
      <!-- Blinking Cursor -->
      <rect x="0" y="4" width="2" height="20" fill="#2A64F6">
        <animate attributeName="x" from="0" to="580" dur="4s" begin="0.5s" fill="freeze" keyTimes="0;1" keySplines="0.4 0 0.2 1" calcMode="spline" />
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Quick Stats Row (Nothing / Vercel style) -->
    <g transform="translate(0, 240)">
      <!-- Stat 1 -->
      <text x="0" y="15" fill="#2A64F6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" letter-spacing="1">ROLE</text>
      <text x="0" y="32" fill="#F4F6F8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500">Co-Founder @ AbhiyantriX</text>

      <!-- Divider line -->
      <line x1="210" y1="5" x2="210" y2="35" stroke="#131C30" stroke-width="1.5"/>

      <!-- Stat 2 -->
      <text x="230" y="15" fill="#2A64F6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" letter-spacing="1">LOCATION</text>
      <text x="230" y="32" fill="#F4F6F8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500">Thane, MH, India</text>

      <!-- Divider line -->
      <line x1="410" y1="5" x2="410" y2="35" stroke="#131C30" stroke-width="1.5"/>

      <!-- Stat 3 -->
      <text x="430" y="15" fill="#2A64F6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" letter-spacing="1">EDUCATION</text>
      <text x="430" y="32" fill="#F4F6F8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500">Xavier Institute of Engineering</text>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="830" height="320" viewBox="0 0 830 320" fill="none">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#131C28" stroke-width="1"/>
    </pattern>

    <!-- Clip Path for typing animation -->
    <clipPath id="clip-tagline">
      <rect id="mask-rect" x="0" y="0" width="0" height="30">
        <animate attributeName="width" from="0" to="580" dur="3s" begin="0.8s" fill="freeze" keyTimes="0;1" keySplines="0.16 1 0.3 1" calcMode="spline" />
      </rect>
    </clipPath>

    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes moveGrid {
        0% { transform: translateY(0); }
        100% { transform: translateY(40px); }
      }
      @keyframes floatCircle {
        0% { transform: translate(0, 0); }
        50% { transform: translate(15px, -10px); }
        100% { transform: translate(0, 0); }
      }
      .hero-container {
        opacity: 0;
        animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .moving-grid {
        animation: moveGrid 25s linear infinite;
      }
      .floating-accent {
        animation: floatCircle 8s ease-in-out infinite;
      }
    </style>
  </defs>

  <!-- Deep Obsidian Background -->
  <rect width="830" height="320" rx="16" fill="#080B10"/>
  
  <!-- Moving Grid overlay -->
  <g class="moving-grid">
    <rect width="830" height="360" y="-40" fill="url(#grid)"/>
  </g>

  <!-- Sleek Border using Slate -->
  <rect x="0.75" y="0.75" width="828.5" height="318.5" rx="15.25" stroke="#1E293B" stroke-width="1.5" style="mix-blend-mode: screen; opacity: 0.85;"/>

  <!-- Floating accent background block (Indigo glow aura) -->
  <circle cx="750" cy="120" r="120" fill="#6366F1" fill-opacity="0.04" class="floating-accent" />

  <!-- Content Group -->
  <g class="hero-container" transform="translate(60, 0)">
    <!-- Top Status Pill (Sky Blue / Cyan Accent) -->
    <g transform="translate(0, 48)">
      <rect width="138" height="22" rx="11" fill="#080B10" stroke="#38BDF8" stroke-width="1.2" />
      <circle cx="12" cy="11" r="3.5" fill="#38BDF8">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="24" y="15" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="700" letter-spacing="1.5">CREATIVE BUILDER</text>
    </g>

    <!-- Title (Pure White, focal point scaled up) -->
    <text x="0" y="115" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Outfit', 'Segoe UI', sans-serif" font-size="40" font-weight="800" letter-spacing="-0.8px">
      MUTHUSAM THEVAR
    </text>

    <!-- Subtitle Roles: Redesigned as modern pill badges instead of // -->
    <g transform="translate(0, 132)">
      <!-- Pill 1: Computer Engineering -->
      <g transform="translate(0, 0)">
        <rect width="180" height="22" rx="6" fill="#0D1117" stroke="#1E293B" stroke-width="1"/>
        <text x="90" y="15" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" text-anchor="middle">COMPUTER ENGINEERING</text>
      </g>
      <!-- Pill 2: Full-Stack Developer -->
      <g transform="translate(190, 0)">
        <rect width="140" height="22" rx="6" fill="#0D1117" stroke="#1E293B" stroke-width="1"/>
        <text x="70" y="15" fill="#38BDF8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="700" letter-spacing="0.5" text-anchor="middle">FULL-STACK DEVELOPER</text>
      </g>
      <!-- Pill 3: UI/UX Designer -->
      <g transform="translate(340, 0)">
        <rect width="120" height="22" rx="6" fill="#0D1117" stroke="#1E293B" stroke-width="1"/>
        <text x="60" y="15" fill="#6366F1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="700" letter-spacing="0.5" text-anchor="middle">UI/UX DESIGNER</text>
      </g>
    </g>

    <!-- Tagline (With typing animation) -->
    <g transform="translate(0, 182)">
      <g clip-path="url(#clip-tagline)">
        <text x="0" y="20" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="400" letter-spacing="0.5">
          Building products that solve real problems through design and code.
        </text>
      </g>
      <!-- Blinking Cursor -->
      <rect x="0" y="4" width="2" height="20" fill="#6366F1">
        <animate attributeName="x" from="0" to="580" dur="3s" begin="0.8s" fill="freeze" keyTimes="0;1" keySplines="0.16 1 0.3 1" calcMode="spline" />
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Balanced Details Row (Nothing / Vercel style) -->
    <g transform="translate(0, 240)">
      <!-- Stat 1 -->
      <text x="0" y="15" fill="#6366F1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" letter-spacing="1">ROLE</text>
      <text x="0" y="32" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500">Co-Founder @ AbhiyantriX</text>

      <!-- Divider line -->
      <line x1="210" y1="5" x2="210" y2="35" stroke="#1E293B" stroke-width="1.5"/>

      <!-- Stat 2 -->
      <text x="230" y="15" fill="#6366F1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" letter-spacing="1">LOCATION</text>
      <text x="230" y="32" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500">Thane, MH, India</text>

      <!-- Divider line -->
      <line x1="410" y1="5" x2="410" y2="35" stroke="#1E293B" stroke-width="1.5"/>

      <!-- Stat 3 -->
      <text x="430" y="15" fill="#6366F1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" letter-spacing="1">EDUCATION</text>
      <text x="430" y="32" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500">Xavier Institute of Engineering</text>
    </g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="830" height="120" viewBox="0 0 830 120" fill="none">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .milestones-container {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 1.9s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
      }
      .milestones-container:hover {
        transform: translateY(-2px);
        filter: drop-shadow(0 4px 10px rgba(99, 102, 241, 0.15));
      }
      .milestones-container:hover .card {
        stroke: #6366F1;
      }
      .card {
        fill: #0D1117;
        stroke: #1E293B;
        stroke-width: 1.5;
        rx: 12px;
        transition: stroke 0.3s;
      }
      .badge-bg { fill: #080B10; stroke: #1E293B; stroke-width: 1; }
      .badge-name { fill: #94A3B8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; font-weight: 600; text-anchor: middle; letter-spacing: 0.5px; }
      .badge-rank { font-family: -apple-system, BlinkMacSystemFont, 'Outfit', 'Segoe UI', sans-serif; font-size: 18px; font-weight: 800; text-anchor: middle; }
    </style>
  </defs>

  <g class="milestones-container">
    <!-- Main Card Body -->
    <rect width="830" height="120" class="card" />

    <!-- Grid lines -->
    <line x1="120" y1="0" x2="120" y2="120" stroke="#1E293B" stroke-dasharray="4 4" stroke-opacity="0.3" />

    <!-- Left Header Info -->
    <g transform="translate(25, 38)">
      <text x="0" y="15" fill="#38BDF8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" letter-spacing="1px">DEVELOPER</text>
      <text x="0" y="32" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="800" letter-spacing="0.5px">MILESTONES</text>
      <text x="0" y="48" fill="#6366F1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="700" letter-spacing="0.5px">UPDATED 2026</text>
    </g>

    <!-- Badge 1: Commits -->
    <g transform="translate(170, 20)">
      <circle cx="35" cy="35" r="30" class="badge-bg" stroke="#38BDF8" stroke-width="1.5" />
      <text x="35" y="42" class="badge-rank" fill="#38BDF8">A+</text>
      <text x="35" y="85" class="badge-name">COMMITS</text>
    </g>

    <!-- Badge 2: Repos -->
    <g transform="translate(280, 20)">
      <circle cx="35" cy="35" r="30" class="badge-bg" stroke="#38BDF8" />
      <text x="35" y="41" class="badge-rank" fill="#FFFFFF">A</text>
      <text x="35" y="85" class="badge-name">REPOS</text>
    </g>

    <!-- Badge 3: Stars -->
    <g transform="translate(390, 20)">
      <circle cx="35" cy="35" r="30" class="badge-bg" />
      <text x="35" y="41" class="badge-rank" fill="#94A3B8">B</text>
      <text x="35" y="85" class="badge-name">STARS</text>
    </g>

    <!-- Badge 4: Followers -->
    <g transform="translate(500, 20)">
      <circle cx="35" cy="35" r="30" class="badge-bg" />
      <text x="35" y="41" class="badge-rank" fill="#94A3B8">B</text>
      <text x="35" y="85" class="badge-name">FOLLOWERS</text>
    </g>

    <!-- Badge 5: PRs -->
    <g transform="translate(610, 20)">
      <circle cx="35" cy="35" r="30" class="badge-bg" stroke="#38BDF8" />
      <text x="35" y="41" class="badge-rank" fill="#FFFFFF">A</text>
      <text x="35" y="85" class="badge-name">PULL REQS</text>
    </g>

    <!-- Badge 6: Hackathons -->
    <g transform="translate(720, 20)">
      <circle cx="35" cy="35" r="30" class="badge-bg" stroke="#6366F1" stroke-width="1.5"/>
      <text x="35" y="42" class="badge-rank" fill="#6366F1">S</text>
      <text x="35" y="85" class="badge-name">HACKATHONS</text>
    </g>
  </g>
</svg>

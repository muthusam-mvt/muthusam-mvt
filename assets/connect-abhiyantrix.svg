<svg xmlns="http://www.w3.org/2000/svg" width="185" height="100" viewBox="0 0 185 100" fill="none">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .card-container {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 2.15s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
      }
      .card-container:hover {
        transform: translateY(-3px);
        filter: drop-shadow(0 4px 8px rgba(105, 68, 255, 0.2));
      }
    </style>
  </defs>

  <g class="card-container">
    <!-- Background with Purple Border -->
    <rect width="185" height="100" rx="10" fill="#000000" stroke="#6944FF" stroke-width="1.5" />

    <!-- AbhiyantriX Icon -->
    <g transform="translate(20, 20)">
      <path d="M4 18 L10 6 L16 18 M6 14 L14 14 M12 6 L18 18 M18 6 L12 18" stroke="#6944FF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Title -->
    <text x="20" y="65" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" letter-spacing="0.5px">
      ABHIYANTRIX
    </text>

    <!-- Handle -->
    <text x="20" y="82" fill="#8E9BB0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="400">
      company/abhiyantrix27
    </text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="185" height="100" viewBox="0 0 185 100" fill="none">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .card-container {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 2.05s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
      }
      .card-container:hover {
        transform: translateY(-3px);
        filter: drop-shadow(0 4px 8px rgba(212, 196, 174, 0.12));
      }
      .card-container:hover .card {
        stroke: #D4C4AE;
      }
      .card {
        fill: #19201C;
        stroke: #222A26;
        stroke-width: 1.5;
        rx: 10px;
        transition: stroke 0.3s;
      }
    </style>
  </defs>

  <g class="card-container">
    <!-- Deep Forest Charcoal Background Card -->
    <rect width="185" height="100" class="card" />

    <!-- Instagram Icon (Sage Green) -->
    <g transform="translate(20, 18) scale(0.95)">
      <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051C.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" fill="#C8D3C5"/>
    </g>

    <!-- Title (Chalk White) -->
    <text x="20" y="65" fill="#F4F3EF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" letter-spacing="0.5px">
      INSTAGRAM
    </text>

    <!-- Handle (Muted Sage Green) -->
    <text x="20" y="82" fill="#A0ADA4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="400">
      @msam_mvt
    </text>
  </g>
</svg>

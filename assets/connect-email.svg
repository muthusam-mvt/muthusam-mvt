<svg xmlns="http://www.w3.org/2000/svg" width="185" height="100" viewBox="0 0 185 100" fill="none">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .card-container {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 2.1s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
      }
      .card-container:hover {
        transform: translateY(-3px);
        filter: drop-shadow(0 4px 8px rgba(99, 102, 241, 0.2));
      }
      .card-container:hover .card {
        stroke: #6366F1;
      }
      .card {
        fill: #0D1117;
        stroke: #1E293B;
        stroke-width: 1.5;
        rx: 10px;
        transition: stroke 0.3s;
      }
    </style>
  </defs>

  <g class="card-container">
    <!-- Background with Slate Border -->
    <rect width="185" height="100" class="card" />

    <!-- Email Icon -->
    <g transform="translate(20, 20)">
      <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="#6366F1" />
    </g>

    <!-- Title -->
    <text x="20" y="65" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" letter-spacing="0.5px">
      EMAIL
    </text>

    <!-- Handle -->
    <text x="20" y="82" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9" font-weight="400">
      muthusamthevar@gmail.com
    </text>
  </g>
</svg>

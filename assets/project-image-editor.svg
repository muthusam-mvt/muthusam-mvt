<svg xmlns="http://www.w3.org/2000/svg" width="830" height="120" viewBox="0 0 830 120" fill="none">
  <!-- Dark Obsidian Background with White Border -->
  <rect width="830" height="120" rx="12" fill="#090D16" stroke="#F4F6F8" stroke-width="1.5" />
  
  <!-- Subtle Background Grid lines -->
  <line x1="100" y1="0" x2="100" y2="120" stroke="#131C30" stroke-dasharray="4 4" />
  
  <!-- Project Icon (Aperture) -->
  <g transform="translate(30, 35)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#F4F6F8" fill-opacity="0.1" stroke="#F4F6F8" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="10" stroke="#F4F6F8" stroke-width="1.5" fill="none" />
    <path d="M20 10 L25 15 M20 30 L15 25 M30 20 L25 25 M10 20 L15 15" stroke="#F4F6F8" stroke-width="1.5" />
  </g>

  <!-- Content -->
  <text x="130" y="38" fill="#F4F6F8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" letter-spacing="-0.3px">
    Image Editing Desktop Application
  </text>
  
  <text x="130" y="62" fill="#8E9BB0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="400">
    High-performance desktop image editing tool featuring OpenCV filters, cropping, adjustments, and real-time preview.
  </text>
  
  <!-- Tech Stack Tag -->
  <text x="130" y="90" fill="#F4F6F8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">
    Python // Desktop Application // OpenCV
  </text>

  <!-- Decorative Accent Block -->
  <rect x="800" y="45" width="4" height="30" rx="2" fill="#F4F6F8" />
</svg>

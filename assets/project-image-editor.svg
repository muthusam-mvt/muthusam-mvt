<svg xmlns="http://www.w3.org/2000/svg" width="830" height="120" viewBox="0 0 830 120" fill="none">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .card-container {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 1.0s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
      }
      .card-container:hover {
        transform: translateY(-3px);
        filter: drop-shadow(0 6px 12px rgba(212, 196, 174, 0.12));
      }
      .card-container:hover .card {
        stroke: #D4C4AE;
      }
      .card {
        fill: #19201C;
        stroke: #222A26;
        stroke-width: 1.5;
        rx: 12px;
        transition: stroke 0.3s;
      }
    </style>
  </defs>

  <g class="card-container">
    <!-- Deep Forest Charcoal Background Card -->
    <rect width="830" height="120" class="card" />
    
    <!-- Subtle Background Grid lines -->
    <line x1="100" y1="0" x2="100" y2="120" stroke="#222A26" stroke-dasharray="4 4" stroke-opacity="0.3" />
    
    <!-- Project Icon (Aperture) using Sage Green -->
    <g transform="translate(30, 35)">
      <rect x="0" y="0" width="40" height="40" rx="8" fill="#C8D3C5" fill-opacity="0.08" stroke="#C8D3C5" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="10" stroke="#C8D3C5" stroke-width="1.5" fill="none" />
      <path d="M20 10 L25 15 M20 30 L15 25 M30 20 L25 25 M10 20 L15 15" stroke="#C8D3C5" stroke-width="1.5" />
    </g>

    <!-- Content -->
    <text x="130" y="38" fill="#F4F3EF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" letter-spacing="-0.3px">
      Image Editing Desktop Application
    </text>
    
    <text x="130" y="62" fill="#A0ADA4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="400">
      High-performance desktop image editing tool featuring OpenCV filters, cropping, adjustments, and real-time preview.
    </text>
    
    <!-- Tech Stack Tag using Champagne Gold and Dot divider -->
    <text x="130" y="90" fill="#D4C4AE" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">
      Python • Desktop Application • OpenCV
    </text>

    <!-- Decorative Accent Block -->
    <rect x="800" y="45" width="4" height="30" rx="2" fill="#D4C4AE" />
  </g>
</svg>

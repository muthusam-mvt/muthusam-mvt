    <rect x="0" y="0" width="40" height="40" rx="8" fill="#38BDF8" fill-opacity="0.1" stroke="#38BDF8" stroke-width="1.5"/>
    <path d="M20 12 L22 17 L27 19 L22 21 L20 26 L18 21 L13 19 L18 17 Z" fill="#38BDF8" />
    <path d="M28 11 L29 13 L31 14 L29 15 L28 17 L27 15 L25 14 L27 13 Z" fill="#38BDF8" opacity="0.6"/>

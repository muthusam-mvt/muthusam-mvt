<svg xmlns="http://www.w3.org/2000/svg" width="830" height="120" viewBox="0 0 830 120" fill="none">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .card-container {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.8s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
      }
      .card-container:hover {
        transform: translateY(-3px);
        filter: drop-shadow(0 6px 12px rgba(255, 101, 0, 0.15));
      }
    </style>
  </defs>

  <g class="card-container">
    <!-- Dark Obsidian Background with Orange Border -->
    <rect width="830" height="120" rx="12" fill="#000000" stroke="#FF6500" stroke-width="1.5" />
    
    <!-- Subtle Background Grid lines -->
    <line x1="100" y1="0" x2="100" y2="120" stroke="#111111" stroke-dasharray="4 4" />
    
    <!-- Project Icon (AI Sparkles) -->
    <g transform="translate(30, 35)">
      <rect x="0" y="0" width="40" height="40" rx="8" fill="#FF6500" fill-opacity="0.1" stroke="#FF6500" stroke-width="1.5"/>
      <path d="M20 12 L22 17 L27 19 L22 21 L20 26 L18 21 L13 19 L18 17 Z" fill="#FF6500" />
      <path d="M28 11 L29 13 L31 14 L29 15 L28 17 L27 15 L25 14 L27 13 Z" fill="#FF6500" opacity="0.6"/>
    </g>

    <!-- Content -->
    <text x="130" y="38" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" letter-spacing="-0.3px">
      EditVerse AI
    </text>
    
    <text x="130" y="62" fill="#FFFFFF" fill-opacity="0.7" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="400">
      An AI-powered web application that transforms images using natural language prompts with a clean responsive interface.
    </text>
    
    <!-- Tech Stack Tag -->
    <text x="130" y="90" fill="#FF6500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">
      AI Image Editing // Vercel // Prompt Engineering
    </text>

    <!-- Decorative Accent Block -->
    <rect x="800" y="45" width="4" height="30" rx="2" fill="#FF6500" />
  </g>
</svg>

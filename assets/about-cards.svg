<svg xmlns="http://www.w3.org/2000/svg" width="830" height="240" viewBox="0 0 830 240" fill="none">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .about-container {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.3s;
      }
      .card {
        fill: #0D1117;
        stroke: #1E293B;
        stroke-width: 1.5;
        rx: 12px;
        transition: stroke 0.3s, transform 0.3s;
      }
      .card-group {
        transition: transform 0.3s;
        cursor: pointer;
      }
      .card-group:hover .card {
        stroke: #6366F1;
      }
      .card-group:hover {
        transform: translateY(-3px);
      }
      .chip-bg {
        fill: #080B10;
        stroke: #1E293B;
        stroke-width: 1;
        rx: 4px;
      }
      .title { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
      .chip-text { fill: #94A3B8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 10px; font-weight: 500; }
    </style>
  </defs>

  <g class="about-container">
    <!-- Card 1: Current Focus -->
    <g class="card-group" transform="translate(10, 10)">
      <rect width="250" height="220" class="card" />
      <!-- Header Icon & Title -->
      <g transform="translate(20, 20)">
        <!-- Target / Eye Icon -->
        <circle cx="12" cy="12" r="8" stroke="#6366F1" stroke-width="1.5" fill="none" />
        <circle cx="12" cy="12" r="3" fill="#6366F1" />
        <text x="30" y="16" class="title">Current Focus</text>
      </g>
      <!-- Chip Items -->
      <g transform="translate(20, 55)">
        <g transform="translate(0, 0)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">Full Stack Applications</text></g>
        <g transform="translate(0, 30)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">Scalable Backend Architecture</text></g>
        <g transform="translate(0, 60)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">AI Integrations &amp; Agents</text></g>
        <g transform="translate(0, 90)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">UI/UX Interface Design</text></g>
        <g transform="translate(0, 120)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">Open Source Development</text></g>
      </g>
    </g>

    <!-- Card 2: Currently Learning -->
    <g class="card-group" transform="translate(290, 10)">
      <rect width="250" height="220" class="card" />
      <!-- Header Icon & Title -->
      <g transform="translate(20, 20)">
        <!-- CPU / Code Icon -->
        <rect x="4" y="4" width="16" height="16" rx="3" stroke="#38BDF8" stroke-width="1.5" fill="none" />
        <path d="M9 9 H15 M9 12 H15 M9 15 H12" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round" />
        <text x="30" y="16" class="title">Currently Learning</text>
      </g>
      <!-- Chip Items -->
      <g transform="translate(20, 55)">
        <g transform="translate(0, 0)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">Advanced React Architecture</text></g>
        <g transform="translate(0, 30)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">Advanced System Design</text></g>
        <g transform="translate(0, 60)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">DevOps &amp; Infrastructure</text></g>
        <g transform="translate(0, 90)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">Cloud Deployment &amp; AWS</text></g>
      </g>
    </g>

    <!-- Card 3: Looking For -->
    <g class="card-group" transform="translate(570, 10)">
      <rect width="250" height="220" class="card" />
      <!-- Header Icon & Title -->
      <g transform="translate(20, 20)">
        <!-- Compass / Handshake Icon -->
        <circle cx="12" cy="12" r="8" stroke="#6366F1" stroke-width="1.5" fill="none" />
        <path d="M12 8 L14 12 L12 16 L10 12 Z" fill="#6366F1" />
        <text x="30" y="16" class="title">Looking For</text>
      </g>
      <!-- Chip Items -->
      <g transform="translate(20, 55)">
        <g transform="translate(0, 0)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">Open Source Collaboration</text></g>
        <g transform="translate(0, 30)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">Internship Opportunities</text></g>
        <g transform="translate(0, 60)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">Hackathons &amp; Buildathons</text></g>
        <g transform="translate(0, 90)"><rect width="190" height="22" class="chip-bg"/><text x="10" y="14" class="chip-text">Exciting Core Products</text></g>
      </g>
    </g>
  </g>
</svg>

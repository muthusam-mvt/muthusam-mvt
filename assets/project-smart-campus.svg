<svg xmlns="http://www.w3.org/2000/svg" width="830" height="120" viewBox="0 0 830 120" fill="none">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .card-container {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.6s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
      }
      .card-container:hover {
        transform: translateY(-3px);
        filter: drop-shadow(0 6px 12px rgba(200, 211, 197, 0.15));
      }
    </style>
  </defs>

  <g class="card-container">
    <!-- Forest Charcoal Background with Sage Border -->
    <rect width="830" height="120" rx="12" fill="#121614" stroke="#C8D3C5" stroke-width="1.5" />
    
    <!-- Subtle Background Grid lines -->
    <line x1="100" y1="0" x2="100" y2="120" stroke="#222A26" stroke-dasharray="4 4" />
    
    <!-- Project Icon (Campus network grid) -->
    <g transform="translate(30, 35)">
      <rect x="0" y="0" width="40" height="40" rx="8" fill="#C8D3C5" fill-opacity="0.1" stroke="#C8D3C5" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="4" fill="#C8D3C5" />
      <path d="M12 20 H28 M20 12 V28 M14 14 L26 26 M26 14 L14 26" stroke="#C8D3C5" stroke-width="1" stroke-opacity="0.5" />
    </g>

    <!-- Content -->
    <text x="130" y="38" fill="#F4F3EF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" letter-spacing="-0.3px">
      Smart Campus Connect
    </text>
    
    <text x="130" y="62" fill="#F4F3EF" fill-opacity="0.7" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="400">
      A full-stack campus collaboration platform enabling students to connect, share resources, and manage events.
    </text>
    
    <!-- Tech Stack Tag -->
    <text x="130" y="90" fill="#D4C4AE" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">
      Flutter // FastAPI // MongoDB
    </text>

    <!-- Decorative Accent Block -->
    <rect x="800" y="45" width="4" height="30" rx="2" fill="#C8D3C5" />
  </g>
</svg>

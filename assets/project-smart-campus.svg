<svg xmlns="http://www.w3.org/2000/svg" width="830" height="120" viewBox="0 0 830 120" fill="none">
  <!-- Dark Obsidian Background with Electric Blue Border -->
  <rect width="830" height="120" rx="12" fill="#090D16" stroke="#2A64F6" stroke-width="1.5" />
  
  <!-- Subtle Background Grid lines -->
  <line x1="100" y1="0" x2="100" y2="120" stroke="#131C30" stroke-dasharray="4 4" />
  
  <!-- Project Icon (Campus network grid) -->
  <g transform="translate(30, 35)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#2A64F6" fill-opacity="0.1" stroke="#2A64F6" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="4" fill="#2A64F6" />
    <path d="M12 20 H28 M20 12 V28 M14 14 L26 26 M26 14 L14 26" stroke="#2A64F6" stroke-width="1" stroke-opacity="0.5" />
  </g>

  <!-- Content -->
  <text x="130" y="38" fill="#F4F6F8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" letter-spacing="-0.3px">
    Smart Campus Connect
  </text>
  
  <text x="130" y="62" fill="#8E9BB0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="400">
    A full-stack campus collaboration platform enabling students to connect, share resources, and manage events.
  </text>
  
  <!-- Tech Stack Tag -->
  <text x="130" y="90" fill="#2A64F6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">
    Flutter // FastAPI // MongoDB
  </text>

  <!-- Decorative Accent Block -->
  <rect x="800" y="45" width="4" height="30" rx="2" fill="#2A64F6" />
</svg>

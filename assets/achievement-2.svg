<svg xmlns="http://www.w3.org/2000/svg" width="260" height="130" viewBox="0 0 260 130" fill="none">
  <defs>
    <style>
      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .card-container {
        opacity: 0;
        animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 1.6s;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), filter 0.3s;
      }
      .card-container:hover {
        transform: translateY(-3px);
        filter: drop-shadow(0 4px 8px rgba(0, 230, 114, 0.15));
      }
      .card-container:hover .card {
        stroke: #00E672;
      }
      .card {
        fill: #0D1117;
        stroke: #1E293B;
        stroke-width: 1.5;
        rx: 10px;
        transition: stroke 0.3s;
      }
    </style>
  </defs>

  <g class="card-container">
    <!-- Background with Green Accent Border -->
    <rect width="260" height="130" class="card" />

    <!-- Medal Icon (Vector) -->
    <g transform="translate(20, 20)">
      <circle cx="10" cy="12" r="6" stroke="#00E672" stroke-width="1.5" fill="none"/>
      <path d="M6 6 L10 0 L14 6" stroke="#00E672" stroke-width="1.5" stroke-linejoin="round"/>
    </g>

    <!-- Year in Top Right -->
    <text x="240" y="32" text-anchor="end" fill="#00E672" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" letter-spacing="1">
      2025-26
    </text>

    <!-- Result Line 1 -->
    <text x="20" y="76" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="700" letter-spacing="-0.3px">
      🚀 SIH 2025 — College Level
    </text>

    <!-- Result Line 2 -->
    <text x="20" y="98" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="500">
      💻 Participant — KJSIT INTECH
    </text>
  </g>
</svg>
